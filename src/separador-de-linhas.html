<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Separador de Linhas</title>
<style>
:root{--bg:#0f172a;--card:#020617;--text:#e5e7eb;--muted:#94a3b8;--accent:#38bdf8;--border:#1e293b}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:linear-gradient(135deg,#020617,#0f172a);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:#020617;border-bottom:1px solid var(--border);padding:1rem}
.nav{display:flex;gap:1rem}
.nav button{padding:.5rem 1rem;border:none;border-radius:8px;background:var(--accent);color:#020617;font-weight:600;cursor:pointer}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{max-width:700px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
input{width:100%;padding:.6rem;border-radius:8px;border:1px solid var(--border);background:#020617;color:var(--text)}
.actions{display:flex;gap:1rem}
button.action{flex:1;padding:.7rem;border:none;border-radius:8px;background:var(--accent);color:#020617;font-weight:600;cursor:pointer}
button.secondary{background:#020617;border:1px solid var(--border);color:var(--text)}
</style>
</head>
<body>

<header>
<div class="nav">
<button onclick="location.href='../index.html'">Home</button>
<button onclick="location.href='juntador-de-linhas.html'">Juntador</button>
</div>
</header>

<main>
<section class="card">
<h2>Separador de Linhas</h2>
<input id="fileInput" type="file" accept=".txt">
<input id="linesInput" placeholder="1,3,5-10">
<div class="actions">
<button class="action" id="btnSelected" disabled>Selecionadas</button>
<button class="action secondary" id="btnRemaining" disabled>Restantes</button>
</div>
</section>
</main>

<script>
"use strict";
const fileInput=document.getElementById('fileInput');
const linesInput=document.getElementById('linesInput');
const btnSelected=document.getElementById('btnSelected');
const btnRemaining=document.getElementById('btnRemaining');
let fileLines=[];

fileInput.addEventListener('change',async()=>{
 const file=fileInput.files[0];
 const text=await file.text();
 fileLines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
 btnSelected.disabled=false;
 btnRemaining.disabled=false;
});

function parseLines(v){
 const s=new Set();
 v.split(',').forEach(p=>{
  if(p.includes('-')){
   const[a,b]=p.split('-').map(Number);
   for(let i=a;i<=b;i++)s.add(i);
  }else s.add(Number(p));
 });
 return s;
}

function download(name,lines){
 const content=lines.join('\r\n');
 const blob=new Blob([new TextEncoder().encode(content)],{type:'text/plain;charset=utf-8'});
 const url=URL.createObjectURL(blob);
 const a=document.createElement('a');
 a.href=url;a.download=name;a.click();
 URL.revokeObjectURL(url);
}

btnSelected.onclick=()=>{
 const sel=parseLines(linesInput.value);
 download('selecionadas.txt',fileLines.filter((_,i)=>sel.has(i+1)));
};
btnRemaining.onclick=()=>{
 const sel=parseLines(linesInput.value);
 download('restantes.txt',fileLines.filter((_,i)=>!sel.has(i+1)));
};
</script>

</body>
</html>
