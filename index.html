<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DrTool Suite</title>

<style>
:root{
 --bg:#0f172a;--card:#020617;--text:#e5e7eb;
 --muted:#94a3b8;--accent:#38bdf8;--border:#1e293b;
}
*{box-sizing:border-box}
body{
 margin:0;font-family:system-ui;
 background:linear-gradient(135deg,#020617,#0f172a);
 color:var(--text);min-height:100vh;
 display:flex;flex-direction:column
}

/* TOPO COM BOTÕES */
header{
 background:#020617;
 border-bottom:1px solid var(--border);
 padding:1rem;
}
.nav{
 max-width:1200px;
 margin:0 auto;
 display:flex;
 gap:1rem;
 flex-wrap:wrap;
}
.nav button{
 padding:.6rem 1rem;
 border-radius:8px;
 border:none;
 background:var(--accent);
 color:#020617;
 font-weight:600;
 cursor:pointer;
}

/* CONTEÚDO */
main{
 flex:1;
 display:flex;
 align-items:center;
 justify-content:center;
 padding:2rem;
}
.card{
 background:var(--card);
 border:1px solid var(--border);
 border-radius:14px;
 padding:2rem;
 max-width:600px;
 text-align:center;
}
footer{
 text-align:center;
 padding:1rem;
 font-size:.8rem;
 color:var(--muted);
}
</style>
</head>
<body>

<header>
<nav class="nav">
<button onclick="location.href='index.html'">Home</button>
<button onclick="location.href='src/separador-de-linhas.html'">Separador</button>
<button onclick="location.href='src/juntador-de-linhas.html'">Juntador</button>
</nav>
</header>

<main>
<div class="card">
<h1>DrTool Suite</h1>
<p>Ferramentas de tratamento de texto e utilidades de TI.</p>
</div>
</main>

<footer>© 2026 • DrTool Suite</footer>

</body>
</html>
