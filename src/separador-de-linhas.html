<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Separador TXT / CSV – Encoding Correto</title>

<style>
:root {
  --bg:#0f172a;
  --card:#020617;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#38bdf8;
  --border:#1e293b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* =========================
   TOPO PADRÃO (NAV)
========================= */
header{
  background:#020617;
  border-bottom:1px solid var(--border);
  padding:.75rem 1.25rem;
}

.nav{
  max-width:900px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:1rem;
}

.nav a{
  display:flex;
  align-items:center;
  gap:.4rem;
  color:var(--accent);
  text-decoration:none;
  font-weight:600;
  font-size:.9rem;
}

.nav a:hover{
  text-decoration:underline;
}

.nav-title{
  margin-left:auto;
  font-size:.9rem;
  color:var(--muted);
}

/* ========================= */

main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1.5rem;
}

.card{
  max-width:760px;
  width:100%;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.5rem;
  display:flex;
  flex-direction:column;
  gap:1.2rem;
}

h1{text-align:center;margin:0}

label{font-size:.9rem;color:var(--muted)}

input{
  width:100%;
  padding:.65rem;
  border-radius:8px;
  background:#020617;
  border:1px solid var(--border);
  color:var(--text)
}

.actions{
  display:flex;
  gap:1rem;
  flex-wrap:wrap
}

button{
  flex:1;
  padding:.75rem;
  border-radius:8px;
  font-weight:600;
  border:none;
  cursor:pointer;
  background:var(--accent);
  color:#020617
}

button.secondary{
  background:#020617;
  border:1px solid var(--border);
  color:var(--text)
}

footer{
  text-align:center;
  font-size:.75rem;
  color:var(--muted)
}
</style>
</head>

<body>

<!-- TOPO PADRÃO -->
<header>
  <nav class="nav" aria-label="Navegação principal">
    <a href="../index.html" aria-label="Voltar para página inicial">
      ← DrTool
    </a>
    <div class="nav-title">Separador TXT / CSV</div>
  </nav>
</header>

<main>
<section class="card">
<h1>Separador TXT / CSV</h1>

<div>
<label>Arquivo (.txt ou .csv)</label>
<input id="fileInput" type="file" accept=".txt,.csv">
</div>

<div>
<label>Linhas desejadas (1,3,5-10)</label>
<input id="linesInput" placeholder="1,3,5-10">
</div>

<div class="actions">
<button id="btnSelected" disabled>Baixar selecionadas</button>
<button id="btnRemaining" class="secondary" disabled>Baixar restantes</button>
</div>

<footer>Saída UTF-8 sem BOM · CRLF · Encoding automático</footer>
</section>
</main>

<script>
"use strict";

const fileInput = document.getElementById('fileInput');
const linesInput = document.getElementById('linesInput');
const btnSelected = document.getElementById('btnSelected');
const btnRemaining = document.getElementById('btnRemaining');

let fileLines = [];

/* 🔎 Leitura inteligente de encoding */
async function readTextAutoEncoding(file) {
  const utf8Text = await file.text();
  if (!utf8Text.includes('�')) return utf8Text;

  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsText(file, 'windows-1252');
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;

  const text = await readTextAutoEncoding(file);
  fileLines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');

  btnSelected.disabled = false;
  btnRemaining.disabled = false;
});

/* Parse linhas */
function parseLines(value){
  const set=new Set();
  value.split(',').forEach(p=>{
    if(p.includes('-')){
      const[a,b]=p.split('-').map(Number);
      if(!isNaN(a)&&!isNaN(b)){
        for(let i=a;i<=b;i++) set.add(i);
      }
    }else{
      const n=Number(p);
      if(!isNaN(n)) set.add(n);
    }
  });
  return set;
}

/* UTF-8 sem BOM + CRLF */
function downloadFile(name, lines){
  const content = lines.join('\r\n');
  const data = new TextEncoder().encode(content);
  const blob = new Blob([data],{type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;
  a.download=name;
  a.click();
  URL.revokeObjectURL(url);
}

btnSelected.onclick=()=>{
  const sel=parseLines(linesInput.value);
  downloadFile(
    'linhas_selecionadas.txt',
    fileLines.filter((_,i)=>sel.has(i+1))
  );
};

btnRemaining.onclick=()=>{
  const sel=parseLines(linesInput.value);
  downloadFile(
    'linhas_restantes.txt',
    fileLines.filter((_,i)=>!sel.has(i+1))
  );
};
</script>

</body>
</html>
